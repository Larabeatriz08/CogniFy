<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cognify AI</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <nav>

      <div class="logo">
        <div class="logo-icon"></div>
        CogniFy <span>AI</span>
      </div>

      <div class="menu">
        <a href="#">Features</a>
        <a href="#">Dashboard</a>
        <a href="#">About</a>
        <a href="#">FAQ</a>
      </div>

      <button class="nav-btn">Start Free</button>

    </nav>

    <section class="hero">

      <div class="grid"></div>

      <div class="badge">
        New · Powered by adaptive AI
      </div>

      <h1>
        Estude com uma IA
        que entende você<span>.</span>
      </h1>

      <p class="description">
        Cognify organiza sua rotina, gera cronogramas inteligentes e acompanha seu desempenho — tudo em um espaço calmo e feito para focar.
      </p>

      <div class="buttons">

        <button class="primary-btn">
          Start Free →
        </button>

        <button class="secondary-btn">
          ▶ Watch Demo
        </button>

      </div>

      <div class="stats">

        <div class="stat">
          <h2>50k+</h2>
          <p>Estudantes</p>
        </div>

        <div class="stat">
          <h2>2.4M</h2>
          <p>Horas focadas</p>
        </div>

        <div class="stat">
          <h2>98%</h2>
          <p>Recomendam</p>
        </div>

      </div>

    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
